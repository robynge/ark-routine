name: Fetch Earnings
on:
  schedule:
    # Every 2 hours, anchored so 5 PM ET (EDT) lands on the schedule.
    # 21:00 UTC = 5 PM EDT (4 PM EST in winter).
    # Odd UTC hours: 01, 03, 05, 07, 09, 11, 13, 15, 17, 19, 21, 23.
    # In EDT this hits: 9 PM, 11 PM, 1 AM, 3 AM, 5 AM, 7 AM, 9 AM, 11 AM,
    #                   1 PM, 3 PM, 5 PM, 7 PM ET — covers full earnings day.
    - cron: '0 1-23/2 * * *'
  workflow_dispatch: {}

# Two crons + a long fetch could overlap; serialize.
concurrency:
  group: fetch-earnings
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install WeasyPrint system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libffi-dev \
            fonts-dejavu-core

      - name: Install Python deps
        run: pip install --quiet earningscall weasyprint

      - name: Verify ARK CSVs are present
        run: |
          # CSVs live at data/holdings/LATEST/*.csv (refresh-csvs.yml symlinks LATEST → today's date dir).
          ls data/holdings/LATEST/*.csv 2>/dev/null | wc -l
          if [ -z "$(ls data/holdings/LATEST/*.csv 2>/dev/null)" ]; then
            echo "::warning::No ARK CSVs at data/holdings/LATEST/. Skipping earnings fetch."
            exit 0
          fi

      - name: Fetch + render today + yesterday (ET)
        env:
          EARNINGSCALL_API_KEY: ${{ secrets.EARNINGSCALL_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
          # All 4 data scripts (parse_holdings, find_today_calls, fetch_transcript,
          # render_transcript) now live in this repo's scripts/ directly. No more
          # cross-repo clone of ark-earnings-routine.
          SCRIPTS_REPO_DIR: ${{ github.workspace }}
        run: python3 scripts/run_earnings.py

      - name: Commit
        run: |
          git config user.email "ark-bot@github.com"
          git config user.name "ARK Earnings Bot"
          git add earnings/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Earnings refresh $(TZ=America/New_York date +'%Y-%m-%d %H:%M') ET"
          # Pre-push rebase in case another bot pushed during this run.
          git pull --rebase origin main || true
          git push
