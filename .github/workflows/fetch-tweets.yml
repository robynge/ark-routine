name: Fetch Tweets
on:
  schedule:
    # Every 2 hours on the hour, UTC. Each run pulls the last 2h of tweets and
    # merges (dedup by tweet id) into today's per-ticker JSONs, so today's
    # data accumulates the full day across runs.
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Fetch window in hours (default 2). Use 24 for backfill."
        required: false
        default: "2"

# Avoid overlapping runs if a slow fetch is still going when the next cron fires.
concurrency:
  group: fetch-tweets
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install deps
        run: pip install requests

      - name: Run fetch
        env:
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          # Use a workdir OUTSIDE data/ so pipeline.py's internal layout
          # (OUT_ROOT/<DATE>/csvs|tweets/) doesn't pollute the public repo.
          # We move the fetched JSONs into data/tweets/<DATE>/ after the run.
          ARK_OUT_ROOT: ${{ github.workspace }}/.workdir
        run: |
          set -e
          DATE=$(TZ=America/New_York date +%Y-%m-%d)
          YESTERDAY=$(TZ=America/New_York date -d "yesterday" +%Y-%m-%d 2>/dev/null \
                     || python3 -c "import datetime,zoneinfo; print((datetime.datetime.now(zoneinfo.ZoneInfo('America/New_York'))-datetime.timedelta(days=1)).strftime('%Y-%m-%d'))")

          # Stage holdings CSVs from the new layout
          mkdir -p "$ARK_OUT_ROOT/$DATE/csvs"
          if compgen -G "data/holdings/LATEST/*.csv" > /dev/null; then
            cp -u data/holdings/LATEST/*.csv "$ARK_OUT_ROOT/$DATE/csvs/"
          fi
          echo "staged $(ls $ARK_OUT_ROOT/$DATE/csvs/ | wc -l) holdings CSVs"

          # Stage prior tweets so cmd_fetch can dedup-merge new tweets in place
          mkdir -p "$ARK_OUT_ROOT/$DATE/tweets"
          if compgen -G "data/tweets/$DATE/*.json" > /dev/null; then
            cp -u data/tweets/$DATE/*.json "$ARK_OUT_ROOT/$DATE/tweets/"
            echo "staged $(ls $ARK_OUT_ROOT/$DATE/tweets/*.json | wc -l) prior-day tweet JSONs for merge"
          fi

          # Yesterday's _summary.json for cross-day gap protection
          if [ -f "data/tweets/$YESTERDAY/_summary.json" ]; then
            mkdir -p "$ARK_OUT_ROOT/$YESTERDAY/tweets"
            cp -u "data/tweets/$YESTERDAY/_summary.json" "$ARK_OUT_ROOT/$YESTERDAY/tweets/"
          fi

          WINDOW_HOURS="${{ github.event.inputs.window_hours || '2' }}"
          echo "Starting fetch (window=${WINDOW_HOURS}h, ~275 tickers)..."
          python3 ark_pipeline.py fetch "$DATE" "$WINDOW_HOURS"
          echo "--- fetch done ---"

          # Move output to the new tweets/ tree
          mkdir -p "data/tweets/$DATE"
          mv "$ARK_OUT_ROOT/$DATE/tweets"/*.json "data/tweets/$DATE/"
          echo "committed $(ls data/tweets/$DATE/*.json | wc -l) tweet JSONs"

          # Update tweets LATEST symlink
          rm -f data/tweets/LATEST
          (cd data/tweets && ln -s "$DATE" LATEST)

      - name: Commit
        run: |
          git config user.email "ark-bot@github.com"
          git config user.name "ARK Fetch Bot"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Tweets refresh $(TZ=America/New_York date +'%Y-%m-%d %H:%M') ET"
          # Pull-rebase guards against a concurrent commit landing on main between
          # our checkout and push (rare with concurrency=fetch-tweets but cheap).
          git pull --rebase origin main || true
          git push
