name: Refresh ARK Holdings CSVs
on:
  schedule:
    - cron: '30 10 * * *'   # 10:30 UTC = 6:30 AM ET (after ARK publishes ~6 AM ET)
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4

      - name: Download 14 ARK ETF CSVs
        run: |
          set -e
          DATE=$(TZ=America/New_York date +%Y-%m-%d)
          OUT="data/$DATE"
          mkdir -p "$OUT"
          BASE="https://assets.ark-funds.com/fund-documents/funds-etf-csv"
          declare -A URLS=(
            [ARKK]="ARK_INNOVATION_ETF_ARKK_HOLDINGS.csv"
            [ARKG]="ARK_GENOMIC_REVOLUTION_ETF_ARKG_HOLDINGS.csv"
            [ARKQ]="ARK_AUTONOMOUS_TECH._%26_ROBOTICS_ETF_ARKQ_HOLDINGS.csv"
            [ARKW]="ARK_NEXT_GENERATION_INTERNET_ETF_ARKW_HOLDINGS.csv"
            [ARKB]="ARK_21SHARES_BITCOIN_ETF_ARKB_HOLDINGS.csv"
            [ARKVX]="ARK_VENTURE_FUND_ARKVX_HOLDINGS.csv"
            [ARKX]="ARK_SPACE_EXPLORATION_%26_INNOVATION_ETF_ARKX_HOLDINGS.csv"
            [ARKF]="ARK_FINTECH_INNOVATION_ETF_ARKF_HOLDINGS.csv"
            [IZRL]="ARK_ISRAEL_INNOVATIVE_TECHNOLOGY_ETF_IZRL_HOLDINGS.csv"
            [PRNT]="THE_3D_PRINTING_ETF_PRNT_HOLDINGS.csv"
            [ARKD]="ARK_DIET_Q1_BUFFER_ETF_ARKD_HOLDINGS.csv"
            [ARKT]="ARK_DIET_Q4_BUFFER_ETF_ARKT_HOLDINGS.csv"
            [ARKUX]="ARK_VENTURE_FUND_ARKUX_HOLDINGS.csv"
            [ARKSX]="ARK_VENTURE_FUND_ARKSX_HOLDINGS.csv"
          )
          for ETF in "${!URLS[@]}"; do
            curl -fsSL "$BASE/${URLS[$ETF]}" -o "$OUT/${ETF}_Holdings_${DATE}.csv" \
              || echo "WARN: $ETF download failed"
          done
          ls -la "$OUT"

      - name: Update LATEST symlink
        run: |
          DATE=$(TZ=America/New_York date +%Y-%m-%d)
          rm -f data/LATEST
          ln -s "$DATE" data/LATEST
          ls -la data/

      - name: Commit if changed
        run: |
          git config user.email "ark-bot@github.com"
          git config user.name "ARK Refresh Bot"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Refresh ARK CSVs $(TZ=America/New_York date +%Y-%m-%d)"
          git push
